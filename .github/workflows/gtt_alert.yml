name: GTT Alert Daily

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance gspread oauth2client requests

    - name: Run script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        SPREADSHEET_URL: ${{ secrets.SPREADSHEET_URL }}
        GSPREAD_CREDENTIALS: ${{ secrets.GSPREAD_CREDENTIALS }}
      run: python gtt_alert_full_updated.py

    - name: Save JSON (commit back)
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add gtt_stocks.json
        # Agar koi change nahi hua toh error nahi aayega
        git commit -m "GTT stocks update $(date +'%Y-%m-%d')" || exit 0
        # Rebase conflicts se bachne ke liye safe pull strategy
        git pull origin main --strategy-option=theirs --allow-unrelated-histories || true
        git push origin main
