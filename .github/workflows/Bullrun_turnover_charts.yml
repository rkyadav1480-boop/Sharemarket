name: Bull Run Turnover

on:
  schedule:
    - cron: '36 18 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          pip install -r requirements.txt

      - name: Run Script
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          python bull_run_turnover.py
     # ⬇️ ADD THIS NEW STEP TO SAVE THE JSON FILE ⬇️
      - name: Commit and Push JSON Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add bullrun_turnover_history.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-update turnover history [Skip CI]" && git push)
