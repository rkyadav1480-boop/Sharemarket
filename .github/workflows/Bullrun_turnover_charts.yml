name: Run Bull Run turnover

on:
  schedule:
    - cron: '30 10 * * *' # Runs daily
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write         # Allows the bot to write data back to your repo

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }} # Explicitly uses GitHub token for permissions

    - name: Set up Python
      uses: actions/setup-python@v5        # Fixed typo here
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pandas yfinance mplfinance

    - name: Run Python Script
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python bull_run_turnover.py       # Make sure this matches your exact filename

    - name: Commit and Push JSON Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Pull any updates to prevent sync conflicts before pushing
        git pull origin main --rebase || true 
        
        git add bullrun_turnover_history.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "🔄 Auto-update turnover history [Skip CI]" && git push origin HEAD:main)
