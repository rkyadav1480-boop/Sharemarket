name: Gapup Scanner

on:
  schedule:
    - cron: '30 9 * * 1-5'  # 9:30 AM UTC = 3:00 PM IST, Mon-Fri only
  workflow_dispatch:

jobs:
  run-gapup:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Python setup
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Gapup Scanner
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.MY_CHAT_ID }}
        run: |
          python gapup_scanner.py

      - name: Save JSON to repo
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add gapup_history.json || true
          git commit -m "📊 Gapup history $(date '+%d-%m-%Y')" || echo "No changes"
          git push || echo "Push failed"
